version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "deps"

    groups:
      safe-python-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "monthly"

    labels:
      - "dependencies"
      - "github-actions"
