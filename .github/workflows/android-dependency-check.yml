name: Android Dependency Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install buildozer Cython==0.29.33

      - name: Check dependency conflicts
        run: python -m pip check

      - name: Validate Buildozer Android configuration
        run: |
          python - <<'PY'
          from configparser import ConfigParser

          cfg = ConfigParser()
          with open("buildozer.spec", "r", encoding="utf-8") as f:
              cfg.read_file(f)

          requirements = {
              item.strip()
              for item in cfg.get("app", "requirements", fallback="").split(",")
              if item.strip()
          }
          assert "python3" in requirements, "buildozer.spec must include python3 in app.requirements"
          assert "kivy" in requirements, "buildozer.spec must include kivy in app.requirements"

          archs = cfg.get("app", "android.archs", fallback="").strip()
          assert archs, "buildozer.spec must define app.android.archs for Android builds"
          print("Buildozer Android configuration looks valid.")
          PY

      - name: Verify Buildozer CLI
        run: |
          buildozer --version
          buildozer help android
