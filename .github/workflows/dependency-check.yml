name: Dependency Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check dependency conflicts
        run: python -m pip check

      - name: Check application syntax
        run: python -m py_compile app.py

      - name: Test required imports
        run: |
          python - <<'PY'
          import streamlit
          import moviepy
          import PIL
          import edge_tts
          import sqlite3
          print("Dependency and import checks passed.")
          PY
